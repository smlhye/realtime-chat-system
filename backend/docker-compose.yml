services:
    postgres:
        image: postgres:${POSTGRES_VERSION_TAG}
        container_name: realtime_postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
            PGDATA: /var/lib/postgresql/data
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./postgres-init-db:/docker-entrypoint-initdb.d
        ports:
            - "${DB_PORT}:5432"
        networks:
            - realtime-chat-network
    
    pgadmin:
        image: dpage/pgadmin4
        container_name: realtime_pgadmin
        depends_on: 
            - postgres
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
            PGADMIN_CONFIG_SERVER_MODE: 'False'
        ports:
            - "5050:80"
        volumes:
            - pgadmin_data:/var/lib/pgadmin
        networks:
            - realtime-chat-network

    redis:
        image: redis:7
        container_name: realtime_redis
        restart: unless-stopped
        command: ["redis-server", "--appendonly", "yes"]
        ports:
            - "${REDIS_PORT}:6379"
        volumes:
            - redis_data:/data
        networks:
            - realtime-chat-network

volumes:
    postgres_data:
    pgadmin_data:
    redis_data:

networks:
    realtime-chat-network:
        driver: bridge